name: Crypto Signal Scanner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ shturl.cc/fn297ogcpJdcxybH }}
          TELEGRAM_CHAT_ID: ${{ shturl.cc/8fzIzqAuSp08i2 }}
        run: python signal_shturl.cc/
